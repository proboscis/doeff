[project]
name = "doeff-core-effects"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "doeff",
    "frozendict>=2.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["doeff_core_effects"]

[tool.uv.sources]
doeff = { workspace = true }
