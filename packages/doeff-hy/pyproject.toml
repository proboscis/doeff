[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "doeff-hy"
version = "0.1.0"
description = "Standard Hy macros for doeff effect composition"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "doeff>=0.2.0",
    "doeff-core-effects",
    "hy>=1.2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/doeff_hy"]

[tool.uv.sources]
doeff = { workspace = true }
doeff-core-effects = { workspace = true }
