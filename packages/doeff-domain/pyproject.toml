[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "doeff-domain"
version = "0.1.0"
description = "Opt-in vocabulary domains and conformance checks for doeff effects"
requires-python = ">=3.10"
dependencies = [
    "doeff-core-effects",
    "doeff-vm>=0.2.0",
    "hy>=1.2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/doeff_domain"]

[tool.uv.sources]
doeff-core-effects = { workspace = true }
doeff-vm = { workspace = true }
