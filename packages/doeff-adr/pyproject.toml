[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "doeff-adr"
version = "0.1.0"
description = "Executable ADR contracts for doeff and Hy projects"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "doeff-hy",
    "hy>=1.2.0",
    "pyyaml>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/doeff_adr"]

[tool.uv.sources]
doeff-hy = { workspace = true }
