[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "doeff-adr"
version = "0.1.0"
description = "Executable ADR contracts for doeff and Hy projects"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "doeff-hy",
    "hy>=1.2.0",
    "pytest>=8.1.1",
    "pyyaml>=6.0",
]

[project.scripts]
doeff-adr = "doeff_adr.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/doeff_adr"]

[project.entry-points.pytest11]
doeff_adr = "doeff_adr.pytest_plugin"

[tool.uv.sources]
doeff-hy = { workspace = true }
