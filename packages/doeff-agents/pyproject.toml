[project]
name = "doeff-agents"
version = "0.1.1"
description = "Agent session management for coding agents (Claude, Codex, Gemini) in tmux"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Kento Masui", email = "nameissoap@gmail.com"}
]
keywords = ["doeff", "agents", "tmux", "claude", "codex", "gemini", "session"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "doeff>=0.1.0",
    "doeff-time",
    "doeff-hy",
    "click>=8.0.0",
    "rich>=13.0.0",
    # result-contract validation imports the settled JSON Schema semantics
    # (doeff#482: never hand-roll a subset validator for an enforcement
    # boundary). NOT used by the stdlib-only report-result-mcp relay.
    "jsonschema>=4.21",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "doeff-hy",
]

[project.scripts]
doeff-agents = "doeff_agents.cli:cli"
doeff-sessionhost = "doeff_agents.sessionhost.hostmain:main"

[project.urls]
Homepage = "https://github.com/proboscis/doeff"
Repository = "https://github.com/proboscis/doeff"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/doeff_agents"]

[tool.uv.sources]
doeff = { workspace = true }
doeff-hy = { workspace = true }
