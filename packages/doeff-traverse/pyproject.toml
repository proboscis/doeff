[project]
name = "doeff-traverse"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "doeff",
    "doeff-core-effects",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["doeff_traverse"]

[dependency-groups]
test = [
    "doeff-time",
]

[tool.uv.sources]
doeff = { workspace = true }
doeff-core-effects = { workspace = true }
doeff-time = { workspace = true }
