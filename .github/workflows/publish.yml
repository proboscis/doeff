name: Publish doeff

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish-doeff-vm:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    uses: ./.github/workflows/build-vm.yml
    with:
      publish: true
    secrets: inherit

  publish-doeff-indexer:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    needs: [publish-doeff-vm]
    uses: ./.github/workflows/build-indexer.yml
    with:
      publish: true
    secrets: inherit

  build-python-release-dists:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: doeff-hy
            artifact: doeff-hy-dist
            out-dir: dist-doeff-hy
          - package: doeff-core-effects
            artifact: doeff-core-effects-dist
            out-dir: dist-doeff-core-effects
          - package: doeff
            artifact: doeff-dist
            out-dir: dist-doeff
          - package: doeff-time
            artifact: doeff-time-dist
            out-dir: dist-doeff-time
          - package: doeff-agents
            artifact: doeff-agents-dist
            out-dir: dist-doeff-agents
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel and sdist
        run: uv build --package ${{ matrix.package }} --wheel --sdist --out-dir ${{ matrix.out-dir }}

      - name: Verify built metadata
        run: uv run python tools/verify_dist_metadata.py ${{ matrix.out-dir }}/*.whl ${{ matrix.out-dir }}/*.tar.gz

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.out-dir }}/*

  publish-doeff-hy:
    name: Publish doeff-hy to PyPI
    needs: [build-python-release-dists, publish-doeff-vm, publish-doeff-indexer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    steps:
      - name: Download doeff-hy dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: doeff-hy-dist
          path: dist-doeff-hy

      - name: List doeff-hy artifacts
        run: ls -la dist-doeff-hy/

      - name: Publish doeff-hy to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-doeff-hy/
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-doeff-core-effects:
    name: Publish doeff-core-effects to PyPI
    needs: [build-python-release-dists, publish-doeff-hy]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    steps:
      - name: Download doeff-core-effects dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: doeff-core-effects-dist
          path: dist-doeff-core-effects

      - name: List doeff-core-effects artifacts
        run: ls -la dist-doeff-core-effects/

      - name: Publish doeff-core-effects to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-doeff-core-effects/
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-doeff:
    name: Publish doeff to PyPI
    needs: [build-python-release-dists, publish-doeff-core-effects]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: doeff-dist
          path: dist-doeff

      - name: List artifacts
        run: ls -la dist-doeff/

      - name: Publish doeff to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-doeff/
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-doeff-time:
    name: Publish doeff-time to PyPI
    needs: [build-python-release-dists, publish-doeff]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    steps:
      - name: Download doeff-time dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: doeff-time-dist
          path: dist-doeff-time

      - name: List doeff-time artifacts
        run: ls -la dist-doeff-time/

      - name: Publish doeff-time to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-doeff-time/
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-doeff-agents:
    name: Publish doeff-agents to PyPI
    needs: [build-python-release-dists, publish-doeff-time]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    steps:
      - name: Download doeff-agents dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: doeff-agents-dist
          path: dist-doeff-agents

      - name: List doeff-agents artifacts
        run: ls -la dist-doeff-agents/

      - name: Publish doeff-agents to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-doeff-agents/
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}
